name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Run every OS even if one fails, so an OS-specific regression is visible in isolation.
      fail-fast: false
      matrix:
        # The determinism / line-ending / path handling is OS-sensitive, and the package multi-targets,
        # so exercise the full suite (including the multi-TFM end-to-end tests) on all three platforms.
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          # Pin the build SDK via global.json, and additionally install the net8.0 (LTS) and net9.0
          # runtimes so the multi-targeted end-to-end tests can actually execute on every shipped TFM.
          dotnet-version: |
            8.0.x
            9.0.x
          global-json-file: global.json

      - name: Restore
        run: dotnet restore MinimalEndpoints.slnx

      - name: Build
        run: dotnet build MinimalEndpoints.slnx --configuration Release --no-restore

      # Run the whole suite on every OS and every shipped TFM (the end-to-end tests multi-target
      # net8.0/net9.0/net10.0, so `dotnet test` boots the generated wiring on each runtime here).
      - name: Test (all target frameworks)
        run: dotnet test MinimalEndpoints.slnx --configuration Release --no-build

      # The >= 70% coverage gate lives here, not in the test csprojs, so the gate is owned by CI and a
      # local `dotnet test`/build stays ungated. It runs once (on Linux — coverage is OS-independent)
      # and is checked ONCE on the MERGED total across all test projects, never per-project: the
      # integration tests drive the generator while the unit tests drive the analyzers, so neither alone
      # covers 70% of the whole assembly, but their union far exceeds it. Each project accumulates
      # coverage into one file via coverlet's MergeWith, and the threshold is enforced only on the final
      # run against that union. coverlet.msbuild instruments during this build, so we intentionally do
      # NOT pass --no-build. Coverage is measured on net10.0 only (`-f`) so the multi-targeted end-to-end
      # project does not fan the merge out across TFMs. The exclusions drop the runtime library and the
      # test-helper assembly. Commas in multi-value props are %2C-escaped: a literal comma is split by
      # the dotnet CLI argument parser (MSB1006), and MSBuild un-escapes %2C back.
      - name: Merged coverage gate (>= 70%)
        if: matrix.os == 'ubuntu-latest'
        run: |
          set -euo pipefail
          dir="$PWD/artifacts/coverage"
          mkdir -p "$dir"
          projects=(
            tests/MinimalEndpoints.CodeGeneration.Tests/MinimalEndpoints.CodeGeneration.Tests.csproj
            tests/MinimalEndpoints.CodeGeneration.IntegrationTests/MinimalEndpoints.CodeGeneration.IntegrationTests.csproj
            tests/MinimalEndpoints.CodeFixes.Tests/MinimalEndpoints.CodeFixes.Tests.csproj
            tests/MinimalEndpoints.EndToEnd.Tests/MinimalEndpoints.EndToEnd.Tests.csproj
          )
          last=$(( ${#projects[@]} - 1 ))
          for i in "${!projects[@]}"; do
            args=(
              test "${projects[$i]}" --configuration Release --no-restore -f net10.0
              -p:CollectCoverage=true
              "-p:CoverletOutput=$dir/coverage.json"
              -p:ExcludeByFile="**/obj/**/*.*%2C**/bin/**/*.*"
              -p:Exclude="[MinimalEndpoints]*%2C[MinimalEndpoints.Tests.Common]*"
            )
            if [ "$i" -ne 0 ]; then
              args+=( "-p:MergeWith=$dir/coverage.json" )
            fi
            if [ "$i" -eq "$last" ]; then
              # Final run: emit the merged cobertura and enforce the gate on the union.
              args+=(
                -p:CoverletOutputFormat="json%2Ccobertura"
                -p:Threshold=70
                -p:ThresholdType=line%2Cbranch%2Cmethod
                -p:ThresholdStat=total
              )
            else
              args+=( -p:CoverletOutputFormat=json )
            fi
            dotnet "${args[@]}"
          done

      # Pack only the runtime package (the Roslyn/sample/benchmark/test projects are IsPackable=false),
      # with deterministic ContinuousIntegrationBuild so SourceLink/snupkg are meaningful. Pack/upload
      # run once (on Linux); the package is OS-independent, and a single artifact name avoids collisions.
      - name: Pack
        if: matrix.os == 'ubuntu-latest'
        run: >
          dotnet pack src/MinimalEndpoints/MinimalEndpoints.csproj
          --configuration Release
          -p:ContinuousIntegrationBuild=true

      - name: Upload package artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg
          if-no-files-found: error
